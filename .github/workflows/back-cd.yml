name: Backend CD Pipeline

on:
  push:
    branches: [master]
    paths:
      - "backend/**"
      - ".github/workflows/back-cd.yml"

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    environment: prod

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Baixa o codigo do repositorio
        uses: actions/checkout@v4

      - name: Configurar credenciais AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login no ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build e push da imagem Docker
        working-directory: backend
        run: |
          ECR_URI=${{ secrets.ECR_REPOSITORY }}

          docker build -t $ECR_URI:latest -t $ECR_URI:${{ github.sha }} .

          docker push $ECR_URI:latest
          docker push $ECR_URI:${{ github.sha }}

      - name: Deploy na EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            echo "Login no ECR"
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
            | docker login --username AWS --password-stdin ${{ secrets.ECR_REPOSITORY }}

            echo "Parando container antigo"
            docker stop cobaia-backend || true
            docker rm cobaia-backend || true

            echo "Limpando imagens antigas"
            docker system prune -f

            echo "Pull da nova imagem"
            docker pull ${{ secrets.ECR_REPOSITORY }}:latest

            echo "Buscando MongoDB URI no Secrets Manager"
            MONGODB_URI=$(aws secretsmanager get-secret-value \
              --secret-id mongodb_uri \
              --query SecretString \
              --output text)

            echo "Subindo container"
            docker run -d \
              --name cobaia-backend \
              -p 3000:3000 \
              -e MONGODB_URI="$MONGODB_URI" \
              --restart unless-stopped \
              ${{ secrets.ECR_REPOSITORY }}:latest