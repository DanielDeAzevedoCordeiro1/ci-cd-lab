name: Backend CI Pipeline

on:
    pull_request:
        branches: 
          - develop
          - master
    push:
        branches:
          - develop
          - master
        
jobs:
    backend:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: backend

        steps:

            - name: Checagem do codigo
              uses: actions/checkout@v4
              
            - name: Configurar Node
              uses: actions/setup-node@v4
              with:
                node-version: '21'

            - name: Instalar dependencias
              run: npm install

            - name: Fazer build
              run: npm run build
