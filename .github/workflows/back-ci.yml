name: Backend CI Pipeline

on:
    push:
        branches: [develop]
        paths: ['backend/**']
        
jobs:
    backend:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: backend

        steps:

            - name: Checagem do codigo
              uses: actions/checkout@v3
              
            - name: Configurar Node
              uses: actions/setup-node@v3
              with:
                node-version: '21'

            - name: Instalar dependencias
              run: npm install

            - name: Fazer build
              run: npm run build
